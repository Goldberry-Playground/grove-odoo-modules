# Bounded mechanical self-heal for agent PRs (GOL-308, from approved GOL-303).
#
# Applies ruff's auto-fixes + ruff format to an agent PR that failed the
# "Lint Python" check on a purely mechanical issue (import order / E/F
# auto-fixable rules / formatting), and pushes ONE fix commit. Mirrors the
# repo CI lint job exactly:
#   ruff check . --select E,F,I --line-length 120   (--fix here)
#   ruff format --check . --line-length 120         (write here)
# Non-mechanical failures leave no diff and stay red for the CI failure
# router to escalate. See grove-sites ci-autofix.yml for the full rationale
# and the GITHUB_TOKEN re-trigger limitation (identical here).
#
# Guardrails: agent-authored PRs only; one autofix commit per push (skips if
# the head commit is already a "[ci-autofix]" commit); no-op on a clean diff.
name: CI autofix

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: ci-autofix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  autofix:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0] != null
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Gate (agent PR + loop guard)
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.workflow_run.pull_requests[0].number }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          AUTHOR=$(gh pr view "$PR" --repo "$REPO" --json author -q '.author.login')
          case "$AUTHOR" in
            app/agenticos-developer|agenticos-developer) ;;
            *)
              echo "PR #$PR author '$AUTHOR' is not the agent App bot; skipping."
              echo "proceed=false" >> "$GITHUB_OUTPUT"; exit 0 ;;
          esac
          HEAD_MSG=$(gh api "repos/$REPO/commits/$HEAD_SHA" -q '.commit.message' | head -1)
          if printf '%s' "$HEAD_MSG" | grep -q '\[ci-autofix\]'; then
            echo "Head commit is already a [ci-autofix] commit; skipping to prevent loops."
            echo "proceed=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          HEAD_REF=$(gh pr view "$PR" --repo "$REPO" --json headRefName -q '.headRefName')
          echo "proceed=true" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.gate.outputs.head_ref }}

      - name: Setup Python
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply mechanical fixes (ruff --fix + ruff format)
        if: steps.gate.outputs.proceed == 'true'
        run: |
          pip install ruff
          # Non-fatal: ruff exits non-zero on remaining non-fixable findings.
          ruff check . --select E,F,I --line-length 120 --fix || true
          ruff format . --line-length 120 || true

      - name: Commit & push one fix commit (or skip if clean)
        if: steps.gate.outputs.proceed == 'true'
        env:
          HEAD_REF: ${{ steps.gate.outputs.head_ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No mechanical fixes to apply — non-mechanical failure, leaving for the CI failure router (E1)."
            exit 0
          fi
          git commit \
            -m "chore(ci): apply mechanical ruff lint/format fixes [ci-autofix]" \
            -m "Automated bounded self-heal for an agent PR that failed CI on a mechanical check. One commit per push (GOL-308)." \
            -m "Co-authored-by: Paperclip <noreply@paperclip.ing>"
          git push origin "HEAD:$HEAD_REF"
          echo "::notice::Pushed one [ci-autofix] commit to $HEAD_REF. NOTE: GITHUB_TOKEN pushes do not re-trigger pull_request checks — the next agent push or a maintainer 'Re-run' will re-validate."
