name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Ruff check
        run: ruff check . --select E,F,I --line-length 120
      - name: Ruff format check
        run: ruff format --check . --line-length 120

  validate-manifests:
    name: Validate Module Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse all __manifest__.py files
        run: |
          python3 -c "
          import ast, glob, sys
          manifests = glob.glob('*/__manifest__.py')
          if not manifests:
              print('No manifests found')
              sys.exit(0)
          for f in manifests:
              try:
                  with open(f) as fh:
                      data = ast.literal_eval(fh.read())
                  assert 'name' in data, 'missing name'
                  assert 'version' in data, 'missing version'
                  assert data.get('installable', True), 'not installable'
                  print(f'{f}: valid ({data[\"name\"]} v{data[\"version\"]})')
              except Exception as e:
                  print(f'{f}: INVALID - {e}')
                  sys.exit(1)
          "
