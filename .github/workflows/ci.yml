name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Ruff check
        run: ruff check . --select E,F,I --line-length 120
      - name: Ruff format check
        run: ruff format --check . --line-length 120

  validate-tenant-config:
    name: Validate Tenant Slug Map
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tenant slug map is consistent
        run: |
          python3 -c "
          import ast, sys

          # Parse the tenant slug map from website.py
          with open('grove_headless/models/website.py') as f:
              content = f.read()

          # Extract the _TENANT_SLUGS dict
          tree = ast.parse(content)
          slug_map = None
          for node in ast.walk(tree):
              if isinstance(node, ast.Assign):
                  for target in node.targets:
                      if isinstance(target, ast.Name) and target.id == '_TENANT_SLUGS':
                          slug_map = ast.literal_eval(node.value)

          if not slug_map:
              print('ERROR: _TENANT_SLUGS not found in website.py')
              sys.exit(1)

          print(f'Tenant slugs: {slug_map}')
          required = {'goldberry', 'ggg', 'nursery'}
          missing = required - set(slug_map.keys())
          if missing:
              print(f'ERROR: Missing required tenant slugs: {missing}')
              sys.exit(1)

          for slug, name in slug_map.items():
              if not name.strip():
                  print(f'ERROR: Empty website name for slug \"{slug}\"')
                  sys.exit(1)

          print('All tenant slugs valid')
          "

  validate-manifests:
    name: Validate Module Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse all __manifest__.py files
        run: |
          python3 -c "
          import ast, glob, sys
          manifests = glob.glob('*/__manifest__.py')
          if not manifests:
              print('No manifests found')
              sys.exit(0)
          for f in manifests:
              try:
                  with open(f) as fh:
                      data = ast.literal_eval(fh.read())
                  assert 'name' in data, 'missing name'
                  assert 'version' in data, 'missing version'
                  assert data.get('installable', True), 'not installable'
                  print(f'{f}: valid ({data[\"name\"]} v{data[\"version\"]})')
              except Exception as e:
                  print(f'{f}: INVALID - {e}')
                  sys.exit(1)
          "
