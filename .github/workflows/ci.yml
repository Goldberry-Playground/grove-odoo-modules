name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  # Audit 2026-06-29 cross-repo top item #4: catches workflow injection
  # + shell-quoting bugs across all .github/workflows/*.yml files. Cheap.
  actionlint:
    name: actionlint (workflows)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color

  # Audit 2026-06-29 — this repo had NO secret scanner. Repo holds custom
  # Odoo Python that may accumulate credentials over time. trufflehog
  # verifies hits to reduce false positives. Fast (~10s on a small repo).
  secrets-scan:
    name: trufflehog (verified)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0  # full history — trufflehog scans across commits
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@a05cf0859455b5b16317ee22d809887a4043cdf0 # v3.83.6
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || '' }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

  # Audit 2026-06-29 — this repo had no Python CVE coverage. requirements-ci.txt
  # exists; scan it for known vulnerabilities at PR time.
  pip-audit:
    name: pip-audit (CVE scan)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit
        run: pip-audit --requirement requirements-ci.txt --strict
        # --strict fails on warnings as well as errors

  no-tracked-env-files:
    name: Reject tracked .env files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Single source of truth against the "real .env got committed" leak class.
      # Operator-owned .env files (.env, .env.local, .env.production, .env.grove,
      # .env.monitoring) MUST never appear in git history. Example/template files
      # are allowed (.env.example, .env.*.example, .env.grove.example, etc).
      - name: Fail if a real .env is tracked
        run: |
          tracked=$(git ls-files | grep -E "^(\.env|.*\.env)$" | grep -vE "\.example$" || true)
          if [ -n "$tracked" ]; then
            echo "::error::Real .env file(s) are tracked. Move them to .env.*.example or rotate the secrets:"
            echo "$tracked"
            exit 1
          fi
          echo "No tracked .env (non-example) files."

  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Install ruff
        run: pip install -r requirements-ci.txt
      - name: Ruff check
        run: ruff check . --select E,F,I --line-length 120
      - name: Ruff format check
        run: ruff format --check . --line-length 120

  validate-tenant-config:
    name: Validate Tenant Slug Map
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Verify tenant slug map is consistent
        run: |
          python3 - <<'PY'
          import ast, sys, pathlib
          src = pathlib.Path('grove_headless/models/website.py').read_text()
          tree = ast.parse(src)
          slug_map = None
          for node in ast.walk(tree):
              if isinstance(node, ast.Assign):
                  for t in node.targets:
                      if isinstance(t, ast.Name) and t.id == '_TENANT_SLUGS':
                          slug_map = ast.literal_eval(node.value)
          if not slug_map:
              sys.exit('_TENANT_SLUGS not found in website.py')
          required = {'goldberry', 'ggg', 'nursery'}
          missing = required - set(slug_map.keys())
          if missing:
              sys.exit(f'Missing required tenant slugs: {missing}')
          for slug, name in slug_map.items():
              if not name.strip():
                  sys.exit(f'Empty website name for slug "{slug}"')
          print(f'Tenant slugs valid: {slug_map}')
          PY

  validate-manifests:
    name: Validate Module Manifests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Parse and validate __manifest__.py files
        run: |
          python3 - <<'PY'
          import ast, glob, sys
          manifests = glob.glob('*/__manifest__.py')
          if not manifests:
              sys.exit('No manifests found — repo layout changed?')
          fail = False
          for f in manifests:
              try:
                  data = ast.literal_eval(open(f).read())
                  for k in ('name', 'version', 'depends'):
                      if k not in data:
                          raise AssertionError(f'missing required key: {k}')
                  if not data.get('installable', True):
                      raise AssertionError('module is not installable')
                  if not data['version'].startswith('19.'):
                      raise AssertionError(f"version {data['version']} does not target Odoo 19")
                  print(f'  {f}: ok — {data["name"]} v{data["version"]}')
              except Exception as e:
                  print(f'  {f}: FAIL — {e}')
                  fail = True
          if fail:
              sys.exit(1)
          PY

  validate-xml-data-files:
    name: Validate XML data files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Parse all data XML files referenced in manifests
        run: |
          python3 - <<'PY'
          import ast, glob, sys, xml.etree.ElementTree as ET
          fail = False
          for manifest_path in glob.glob('*/__manifest__.py'):
              module_dir = manifest_path.rsplit('/', 1)[0]
              data = ast.literal_eval(open(manifest_path).read())
              for relpath in data.get('data', []):
                  full = f'{module_dir}/{relpath}'
                  if not relpath.endswith('.xml'):
                      continue
                  try:
                      ET.parse(full)
                      print(f'  {full}: ok')
                  except Exception as e:
                      print(f'  {full}: FAIL — {e}')
                      fail = True
          if fail:
              sys.exit(1)
          PY

  install-smoke-test:
    name: Install + test module against Odoo 19
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, validate-tenant-config, validate-manifests, validate-xml-data-files]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U odoo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository into grove-odoo-modules/
        uses: actions/checkout@v4
        with:
          path: grove-odoo-modules

      # --test-enable runs every Odoo test tagged at_install / post_install
      # during this init. --test-tags scopes execution to grove_headless
      # only (core Odoo's suite is enormous and irrelevant). log-level=info
      # surfaces individual test failures in the run log; log-level=warn
      # would swallow them — that's the one substantive deviation from
      # the simpler version on main.
      - name: Boot Odoo 19 with grove_headless installed and run unit tests
        run: |
          # --test-enable runs every test discovered under grove_headless/tests/.
          # --test-tags filters to only this module's suite (avoids pulling in
          # base Odoo's slow tests). post_install ensures data files are loaded
          # before tests look up seeded websites.
          docker run -d --name odoo \
            --network host \
            -v "$PWD/grove-odoo-modules:/mnt/extra-addons" \
            -e HOST=localhost \
            -e USER=odoo \
            -e PASSWORD=odoo \
            odoo:19 \
            -- --addons-path=/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons \
               --without-demo=all \
               --init=grove_headless \
               --test-enable \
               --test-tags='/grove_headless' \
               --stop-after-init \
               --log-level=info
          # Tests can take longer than install — give it 5 minutes.
          for i in $(seq 1 60); do
            if ! docker ps -q --filter name=odoo --filter status=running | grep -q .; then
              break
            fi
            sleep 5
          done

      - name: Verify exit status and surface logs on failure
        run: |
          status=$(docker inspect odoo --format '{{.State.ExitCode}}')
          echo "Odoo init+test exited: $status"
          if [ "$status" != "0" ]; then
            echo "::group::Odoo logs"
            docker logs odoo
            echo "::endgroup::"
            exit 1
          fi
          # Even on exit 0, surface test result lines so reviewers can see
          # what ran. Odoo logs each test class with a "Module loaded" or
          # "Running tests" prefix.
          echo "::group::Test summary"
          docker logs odoo 2>&1 | grep -E "(odoo.tests|FAIL|PASS|tests/test_|Module grove_headless)" || true
          echo "::endgroup::"
