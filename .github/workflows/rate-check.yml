name: rate-check
on:
  schedule:
    - cron: "0 11 * * *"   # 07:00 ET daily (design: vault Grove Shipping)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print drift only; do not open a PR"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  rate-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Guard — skip cleanly until SHIPPO_API_KEY exists
        id: guard
        env:
          SHIPPO_API_KEY: ${{ secrets.SHIPPO_API_KEY }}
        run: |
          if [ -z "$SHIPPO_API_KEY" ]; then
            echo "::notice::SHIPPO_API_KEY not configured yet — rate-check skipped (TODO: Josh creates the Shippo account)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run rate-checker
        if: steps.guard.outputs.skip == 'false'
        id: check
        env:
          SHIPPO_API_KEY: ${{ secrets.SHIPPO_API_KEY }}
        run: |
          pip install --quiet requests
          set +e
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python3 scripts/rate_check/rate_check.py --dry-run
          else
            python3 scripts/rate_check/rate_check.py
          fi
          code=$?
          set -e
          echo "code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" != "0" ] && [ "$code" != "3" ]; then exit "$code"; fi
      - name: Open / refresh rates PR
        if: steps.guard.outputs.skip == 'false' && steps.check.outputs.code == '3'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "grove-rate-check[bot]"
          git config user.email "noreply@goldberrygrove.farm"
          git checkout -B chore/rate-check
          git add grove_headless/data/shipping_rates.json
          git commit -m "chore(rates): morning rate-check $(date -u +%F) — Shippo-derived zone rates"
          git push -f origin chore/rate-check
          gh pr create --title "Rate check: shipping zone rates drifted >= \$1" \
            --body-file scripts/rate_check/out/summary.md \
            --base main --head chore/rate-check 2>/dev/null \
            || gh pr edit chore/rate-check --body-file scripts/rate_check/out/summary.md
      - name: Discord alert
        if: steps.guard.outputs.skip == 'false' && steps.check.outputs.code == '3'
        env:
          WEBHOOK: ${{ secrets.DISCORD_OPS_WEBHOOK_URL }}
        run: |
          [ -z "$WEBHOOK" ] && { echo "::notice::no Discord webhook configured"; exit 0; }
          body=$(head -c 1800 scripts/rate_check/out/summary.md)
          payload=$(python3 -c "import json,sys;print(json.dumps({'content':'📦 **Shipping rates drifted ≥ \$1** — review the rate-check PR\n'+sys.argv[1]}))" "$body")
          curl -sS -H "Content-Type: application/json" -d "$payload" "$WEBHOOK"
